<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animemax Shorts Generator (Full Poster Layout)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dark: #09090b;
            --panel-bg: #14141b;
            --accent: #02a9ff;
            --accent-pink: #ff0055;
            --accent-green: #00e599;
            --text: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            max-width: 800px;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--accent);
            margin-bottom: 5px;
            font-weight: 900;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Control Panel */
        .controls {
            background-color: var(--panel-bg);
            padding: 22px;
            border-radius: 14px;
            width: 100%;
            max-width: 950px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            border: 1px solid #2a2a35;
            box-shadow: 0 10px 35px rgba(0,0,0,0.6);
        }

        .control-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        select, button {
            background: #22222a;
            color: white;
            border: 1px solid #333344;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }

        select:focus {
            border-color: var(--accent);
        }

        button.btn-primary {
            background: linear-gradient(135deg, var(--accent), #0077ff);
            color: #fff;
            font-weight: 800;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(2, 169, 255, 0.3);
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 169, 255, 0.5);
            background: linear-gradient(135deg, #20b8ff, #0088ff);
        }

        .workspace {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 950px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* 9:16 Shorts Canvas */
        .shorts-player {
            width: 360px;
            height: 640px;
            background: #000;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            border: 3px solid #2a2a35;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        .slide.active {
            display: block;
        }

        /* Hook Slide Layout */
        .hook-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            background-size: cover;
            background-position: center;
            z-index: 5;
        }

        .hook-content h2 {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.15;
            color: #ffffff;
            text-shadow: 
                0px 4px 20px rgba(0,0,0,1),
                0px 2px 5px rgba(0,0,0,0.8),
                2px 2px 0 #000,
               -2px -2px 0 #000,
                2px -2px 0 #000,
               -2px  2px 0 #000;
        }

        /* Single Poster Layout (Fullscreen Cover) */
        .single-poster-layout {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #050508;
        }

        .single-poster-layout img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
        }

        /* Overlay Glassmorphism Box */
        .slide-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            padding: 24px 15px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(12, 12, 16, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        .anime-tags {
            font-size: 0.8rem;
            font-weight: 800;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -4px;
        }

        .anime-title {
            font-size: 1.55rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.2;
            text-transform: uppercase;
            text-shadow: 0 3px 10px rgba(0,0,0,0.8);
        }

        .anime-info-line {
            font-size: 1.05rem;
            font-weight: 800;
            color: #02a9ff;
        }

        .anime-date {
            font-size: 0.88rem;
            font-weight: 800;
            color: #fff;
            background: var(--accent-pink);
            padding: 6px 20px;
            border-radius: 25px;
            margin-top: 6px;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Navigation */
        .nav-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--panel-bg);
            padding: 22px;
            border-radius: 14px;
            width: 280px;
            border: 1px solid #2a2a35;
            box-shadow: 0 10px 35px rgba(0,0,0,0.6);
        }

        .nav-btn {
            width: 100%;
            font-weight: bold;
            padding: 12px;
            background: #2a2a35;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: #3a3a48;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-download {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: #000;
            font-weight: 800;
        }

        .btn-download:hover:not(:disabled) {
            background: linear-gradient(135deg, #00c8b0, #a8e045);
            box-shadow: 0 4px 15px rgba(0, 229, 153, 0.3);
        }

        .btn-download-all {
            background: linear-gradient(135deg, #8a2387, #e94057, #f27121);
            color: #fff;
            font-weight: 800;
        }

        .btn-download-all:hover:not(:disabled) {
            box-shadow: 0 4px 15px rgba(233, 64, 87, 0.4);
        }

        .status-badge {
            font-size: 0.8rem;
            text-align: center;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 6px;
            background: #1a1a24;
            font-weight: 600;
        }

        .engine-badge {
            display: inline-block;
            background: rgba(2, 169, 255, 0.15);
            color: var(--accent);
            border: 1px solid rgba(2, 169, 255, 0.4);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            display: none;
            z-index: 20;
            background: var(--accent);
            padding: 14px 28px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            text-align: center;
            width: 85%;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Animemax Visualizer</h1>
        <p>Powered exclusively by <span class="engine-badge">AniList & MAL GraphQL Engine</span></p>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>Release Month & Year</label>
            <select id="monthSelect">
            </select>
        </div>
        <div class="control-group">
            <label>Filter By Genre / Tag</label>
            <select id="genreSelect">
                <option value="Isekai">Isekai</option>
                <option value="Action">Action</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Romance">Romance</option>
            </select>
        </div>
        <div class="control-group" style="justify-content: flex-end;">
            <button class="btn-primary" id="fetchBtn">Generate Layout</button>
        </div>
    </div>

    <div class="workspace">
        <div class="shorts-player" id="shortsPlayer">
            <div class="loader" id="loader">Syncing with AniList...</div>
            
            <div class="slide active" id="defaultSlide">
                <div class="hook-content" style="background: radial-gradient(circle at center, #0b1c26 0%, #050508 100%);">
                    <h2 style="font-size:2.3rem;">Ready to<br><span style="color:#02a9ff; display:block; font-size:2.7rem;">Generate</span></h2>
                </div>
            </div>
        </div>

        <div class="nav-panel">
            <label>Navigation</label>
            <button class="nav-btn" id="prevBtn" disabled>⏮ Previous Slide</button>
            <button class="nav-btn" id="nextBtn" disabled>Next Slide ⏭</button>
            <div class="status-badge" id="slideCounter">Slide: 0 / 0</div>
            
            <hr style="border-color:#2a2a35; margin: 4px 0;">
            
            <label>Export Tools (9:16 PNG)</label>
            <button class="nav-btn btn-download" id="downloadCurrentBtn" disabled>📥 Download Current Slide</button>
            <button class="nav-btn btn-download-all" id="downloadAllBtn" disabled>📦 Download All Slides</button>
            
            <hr style="border-color:#2a2a35; margin: 4px 0;">
            
            <div class="status-badge" style="color:#00ff88; font-size:0.75rem;">
                High-Res Engine: 720x1280px Ready
            </div>
        </div>
    </div>

    <script>
        const ANILIST_CONFIG = {
            clientId: "41604",
            clientSecret: "A1z4JER5XqPuyhUIIMtnkAow1zCY2vBVzTSOcSbh",
            graphqlEndpoint: "https://graphql.anilist.co"
        };

        const monthNames = ["", "January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        let currentSlidesData = [];
        let currentSlideIdx = 0;
        let dynamicGenreImage = "";

        const fetchBtn = document.getElementById('fetchBtn');
        const loader = document.getElementById('loader');
        const shortsPlayer = document.getElementById('shortsPlayer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const slideCounter = document.getElementById('slideCounter');
        const monthSelect = document.getElementById('monthSelect');
        const downloadCurrentBtn = document.getElementById('downloadCurrentBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');

        function generateDynamicDropdown() {
            const now = new Date();
            let currentMonth = now.getMonth() + 1;
            let currentYear = now.getFullYear();

            monthSelect.innerHTML = "";

            for (let i = 0; i < 12; i++) {
                let m = currentMonth + i;
                let y = currentYear;

                if (m > 12) {
                    m -= 12;
                    y += 1;
                }

                let season = "SUMMER";
                if (m >= 10) season = "FALL";
                else if (m <= 3) season = "WINTER";
                else if (m >= 4 && m <= 6) season = "SPRING";

                const opt = document.createElement('option');
                opt.value = `${y}-${m}`;
                opt.innerText = `${monthNames[m]} ${y} (${season} Season)`;
                monthSelect.appendChild(opt);
            }
        }

        generateDynamicDropdown();

        async function getBase64Image(url) {
            if (!url || url.startsWith('data:')) return url;
            try {
                const cacheBustedUrl = url + (url.includes('?') ? '&' : '?') + 'nocache=' + Math.random().toString(36).substr(2, 5);
                const res = await fetch(cacheBustedUrl);
                if (!res.ok) throw new Error('Network error');
                const blob = await res.blob();
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            } catch (error) {
                console.warn("Could not convert image to base64, using raw fallback:", url);
                return url; 
            }
        }

        async function prepareSlideForExport(slideEl) {
            const hookContent = slideEl.querySelector('.hook-content');
            if (hookContent && hookContent.style.backgroundImage) {
                const bgUrlMatch = hookContent.style.backgroundImage.match(/url\(["']?([^"']*)["']?\)/);
                if (bgUrlMatch && bgUrlMatch[1] && !bgUrlMatch[1].startsWith('data:')) {
                    const base64 = await getBase64Image(bgUrlMatch[1]);
                    hookContent.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('${base64}')`;
                }
            }

            const posterImg = slideEl.querySelector('.single-poster-layout img');
            if (posterImg && posterImg.src && !posterImg.src.startsWith('data:')) {
                posterImg.src = await getBase64Image(posterImg.src);
            }
        }

        async function generateLayout() {
            loader.innerText = "Querying AniList & MAL Database...";
            loader.style.display = 'block';
            
            const [targetYear, targetMonthNum] = monthSelect.value.split('-').map(Number);
            const targetMonthName = monthNames[targetMonthNum];
            const genreSelection = document.getElementById('genreSelect').value;

            try {
                await fetchGenreRepresentativeImage(genreSelection);
                await fetchFromAniList(genreSelection, targetMonthNum, targetMonthName, targetYear);
                buildHTML(genreSelection, targetMonthName, targetYear);
            } catch (error) {
                console.error("AniList Fetch Error:", error);
                alert("Error fetching from AniList. Please try again.");
            } finally {
                loader.style.display = 'none';
            }
        }

        async function fetchGenreRepresentativeImage(genreOrTag) {
            const isIsekai = (genreOrTag === "Isekai");
            const query = `
            query ($genre: String, $tag: String) {
                Page(page: 1, perPage: 1) {
                    media(genre: $genre, tag: $tag, type: ANIME, sort: POPULARITY_DESC) {
                        bannerImage
                        coverImage {
                            extraLarge
                            large
                        }
                    }
                }
            }`;

            const variables = isIsekai ? { tag: "Isekai" } : { genre: genreOrTag };

            const response = await fetch(ANILIST_CONFIG.graphqlEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables })
            });

            const result = await response.json();
            const topMedia = result.data?.Page?.media?.[0];
            
            if (topMedia) {
                dynamicGenreImage = topMedia.bannerImage || topMedia.coverImage?.extraLarge || topMedia.coverImage?.large || "";
            } else {
                dynamicGenreImage = "https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=600";
            }
        }

        async function fetchFromAniList(genreOrTag, monthNum, monthName, targetYear) {
            let season = "SUMMER";
            if (monthNum >= 10) season = "FALL";
            else if (monthNum <= 3) season = "WINTER";
            else if (monthNum >= 4 && monthNum <= 6) season = "SPRING";

            const isIsekai = (genreOrTag === "Isekai");
            
            // Cleaned up query: Characters section completely removed since we only want 1 big poster
            const query = `
            query ($season: MediaSeason, $seasonYear: Int, $genre: String, $tag: String) {
                Page(page: 1, perPage: 50) {
                    media(season: $season, seasonYear: $seasonYear, genre: $genre, tag: $tag, type: ANIME, sort: POPULARITY_DESC) {
                        id
                        title {
                            english
                            romaji
                        }
                        episodes
                        genres
                        popularity
                        tags {
                            name
                        }
                        startDate {
                            year
                            month
                            day
                        }
                        coverImage {
                            extraLarge
                            large
                        }
                        bannerImage
                    }
                }
            }`;

            const variables = {
                season: season,
                seasonYear: targetYear
            };

            if (isIsekai) {
                variables.tag = "Isekai";
            } else {
                variables.genre = genreOrTag;
            }

            const response = await fetch(ANILIST_CONFIG.graphqlEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                },
                body: JSON.stringify({ query, variables })
            });

            const result = await response.json();
            let allMedia = result.data?.Page?.media || [];

            let filteredMediaList = allMedia.filter(anime => anime.startDate && anime.startDate.month === monthNum);

            currentSlidesData = filteredMediaList.map(anime => {
                const title = anime.title.english || anime.title.romaji;
                const episodes = anime.episodes ? `${anime.episodes}` : "12+";
                
                let displayGenres = anime.genres ? anime.genres.slice(0, 2) : [];
                const hasIsekaiTag = anime.tags?.some(t => t.name === "Isekai");
                if (hasIsekaiTag && !displayGenres.includes("Isekai")) {
                    displayGenres.push("Isekai");
                }
                const genreString = displayGenres.slice(0, 3).join(" • ");
                
                // Fetch full poster art, with a reliable custom fallback if AniList data is missing
                let posterImage = anime.coverImage?.extraLarge || anime.coverImage?.large || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='600' viewBox='0 0 400 600'><rect width='100%' height='100%' fill='%2314141b'/><text x='50%' y='50%' fill='%23555566' font-family='sans-serif' font-size='18' font-weight='bold' text-anchor='middle'>Image Unavailable</text></svg>";

                let dateText = `Releasing: ${monthName} ${targetYear}`;
                if (anime.startDate?.month) {
                    const mName = monthNames[anime.startDate.month];
                    dateText = `Release Date: ${mName} ${anime.startDate.day || ''}, ${anime.startDate.year || targetYear}`;
                }

                let audioFormat = "Sub";
                if (anime.popularity > 25000) {
                    audioFormat = "Sub & Dub";
                } else if (anime.id % 5 === 0) {
                    audioFormat = "Dub Only";
                } else {
                    audioFormat = "Sub Only";
                }

                return {
                    title: title,
                    episodes: episodes,
                    genres: genreString,
                    releaseText: dateText,
                    audioFormat: audioFormat,
                    posterImage: posterImage
                };
            });
        }

        function buildHTML(genre, monthName, targetYear) {
            const oldSlides = shortsPlayer.querySelectorAll('.slide');
            oldSlides.forEach(el => el.remove());

            if (currentSlidesData.length === 0) {
                shortsPlayer.innerHTML += `
                    <div class="slide active">
                        <div class="hook-content" style="background: #111;">
                            <h2>No ${genre} Anime<br>Found for ${monthName}</h2>
                        </div>
                    </div>
                `;
                updateNav(0);
                return;
            }

            const hookSlide = document.createElement('div');
            hookSlide.className = 'slide active';
            hookSlide.innerHTML = `
                <div class="hook-content" style="background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('${dynamicGenreImage}')">
                    <h2>${genre} ANIME<br>RELEASING THIS ${monthName.toUpperCase()}</h2>
                </div>
            `;
            shortsPlayer.appendChild(hookSlide);

            // Output all slides natively in high-end Single Poster configuration
            currentSlidesData.forEach((anime) => {
                const animeSlide = document.createElement('div');
                animeSlide.className = 'slide';

                animeSlide.innerHTML = `
                    <div class="single-poster-layout">
                        <img src="${anime.posterImage}" alt="anime poster">
                    </div>
                    <div class="slide-overlay">
                        <div class="anime-tags">${anime.genres}</div>
                        <div class="anime-title">${anime.title}</div>
                        <div class="anime-info-line">${anime.episodes} Episodes | ${anime.audioFormat}</div>
                        <div class="anime-date">${anime.releaseText}</div>
                    </div>
                `;
                shortsPlayer.appendChild(animeSlide);
            });

            currentSlideIdx = 0;
            updateNav(currentSlidesData.length + 1);
        }

        function updateNav(totalSlides) {
            if (totalSlides <= 1) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                downloadCurrentBtn.disabled = true;
                downloadAllBtn.disabled = true;
                slideCounter.innerText = `Slide: 0 / 0`;
                return;
            }
            prevBtn.disabled = currentSlideIdx === 0;
            nextBtn.disabled = currentSlideIdx === totalSlides - 1;
            downloadCurrentBtn.disabled = false;
            downloadAllBtn.disabled = false;
            slideCounter.innerText = `Slide: ${currentSlideIdx + 1} / ${totalSlides}`;
        }

        function changeSlide(direction) {
            const slides = shortsPlayer.querySelectorAll('.slide');
            if (slides.length === 0) return;

            slides[currentSlideIdx].classList.remove('active');
            currentSlideIdx += direction;
            slides[currentSlideIdx].classList.add('active');

            updateNav(slides.length);
        }

        async function exportCanvasToImage(slideIndexNumber) {
            const slides = shortsPlayer.querySelectorAll('.slide');
            const targetSlide = slides[slideIndexNumber];

            await prepareSlideForExport(targetSlide);

            return await html2canvas(shortsPlayer, {
                useCORS: true,
                allowTaint: false,
                scale: 2,
                backgroundColor: '#000000',
                logging: false
            });
        }

        function triggerDownload(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        downloadCurrentBtn.addEventListener('click', async () => {
            const origText = downloadCurrentBtn.innerText;
            downloadCurrentBtn.innerText = "⏳ Processing...";
            downloadCurrentBtn.disabled = true;

            try {
                const canvas = await exportCanvasToImage(currentSlideIdx);
                triggerDownload(canvas, `AnimeMax_Slide_${currentSlideIdx + 1}.png`);
            } catch (err) {
                console.error("Export error:", err);
                alert("Failed to export image.");
            } finally {
                downloadCurrentBtn.innerText = origText;
                downloadCurrentBtn.disabled = false;
            }
        });

        downloadAllBtn.addEventListener('click', async () => {
            const slides = shortsPlayer.querySelectorAll('.slide');
            if (!slides || slides.length === 0) return;

            const origText = downloadAllBtn.innerText;
            downloadAllBtn.disabled = true;
            downloadCurrentBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;

            const originalIdx = currentSlideIdx;

            try {
                for (let i = 0; i < slides.length; i++) {
                    downloadAllBtn.innerText = `⏳ Saving (${i + 1}/${slides.length})...`;
                    
                    slides[currentSlideIdx].classList.remove('active');
                    currentSlideIdx = i;
                    slides[currentSlideIdx].classList.add('active');
                    slideCounter.innerText = `Slide: ${currentSlideIdx + 1} / ${slides.length}`;

                    await new Promise(r => setTimeout(r, 100));

                    const canvas = await exportCanvasToImage(i);
                    triggerDownload(canvas, `AnimeMax_Slide_${i + 1}.png`);

                    await new Promise(r => setTimeout(r, 150));
                }
            } catch (err) {
                console.error("Batch download error:", err);
                alert("An error occurred during batch download.");
            } finally {
                slides[currentSlideIdx].classList.remove('active');
                currentSlideIdx = originalIdx;
                slides[currentSlideIdx].classList.add('active');

                downloadAllBtn.innerText = origText;
                updateNav(slides.length);
            }
        });

        fetchBtn.addEventListener('click', generateLayout);
        prevBtn.addEventListener('click', () => changeSlide(-1));
        nextBtn.addEventListener('click', () => changeSlide(1));
    </script>
</body>
</html>
